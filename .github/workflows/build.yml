name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install CSharpier
        run: dotnet tool install --global csharpier --version 1.2.6

      - name: Check formatting
        run: csharpier check dotnet/

      - name: Build
        run: dotnet build StorkDrop.sln --configuration Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test dotnet/StorkDrop.Tests/StorkDrop.Tests.csproj --configuration Release --no-build

      - name: Publish self-contained exe
        run: >
          dotnet publish dotnet/StorkDrop.App/StorkDrop.App.csproj
          --configuration Release
          --no-build
          --self-contained
          --runtime win-x64
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/

      - name: Pack NuGet
        run: >
          dotnet pack dotnet/StorkDrop.Contracts/StorkDrop.Contracts.csproj
          --configuration Release
          --no-build
          --output publish/
          -p:Version=${{ steps.version.outputs.version }}

      - name: Build installer
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer\setup.iss

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storkdrop-${{ steps.version.outputs.version }}
          path: |
            publish/
            installer/Output/

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            PRERELEASE=false
          else
            VERSION="0.0.0-dev.${{ github.run_number }}"
            PRERELEASE=true
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: storkdrop-${{ steps.version.outputs.version }}
          path: artifacts/

      - name: Push to NuGet
        run: dotnet nuget push artifacts/publish/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        if: startsWith(github.ref, 'refs/tags/v')

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: StorkDrop ${{ steps.version.outputs.version }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/publish/StorkDrop.App.exe
            artifacts/publish/*.nupkg
            artifacts/installer/Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
